{% extends 'base.html' %}

{% block content %}
    <h2>Edit Project</h2>
    <form method="post">
        <label for="title">Project Title:</label><br>
        <input type="text" name="title" id="title" value="{{ project.title }}" required>
        <br><br>

        <label for="description">Description:</label><br>
        <textarea name="description" id="description" rows="4">{{ project.description }}</textarea>
        <br><br>

        <label for="start_date">Start Date:</label><br>
        <input type="date" name="start_date" id="start_date" value="{{ project.start_date }}" required>
        <br><br>

        <label for="deadline">Deadline:</label><br>
        <input type="date" name="deadline" id="deadline" value="{{ project.deadline }}" required>
        <br><br>

        <label for="budget">Total Budget ($):</label><br>
        <input type="number" step="0.01" name="budget" id="budget" value="{{ project.budget }}" required>
        <br><br>

        <input type="submit" value="Update Project">
    </form>
    <br>
    <a href="{{ url_for('home') }}">Cancel</a>
{% endblock %}
