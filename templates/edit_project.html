{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">Edit Project</h2>
</div>

<div class="form-card">
    <form method="post">
        <div class="form-group">
            <label class="form-label">Project Title</label>
            <input type="text" name="title" value="{{ project.title }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description">{{ project.description }}</textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label class="form-label">Start Date</label>
                <input type="date" name="start_date" value="{{ project.start_date }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Deadline</label>
                <input type="date" name="deadline" value="{{ project.deadline }}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Total Budget ($)</label>
            <input type="number" step="0.01" name="budget" value="{{ project.budget }}">
        </div>
        <div style="display:flex; gap:10px; margin-top:8px;">
            <button type="submit" class="btn btn-primary">✅ Update Project</button>
            <a href="{{ url_for('home') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
