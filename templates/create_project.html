{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">Create New Project</h2>
</div>

<div class="form-card">
    <form method="post">
        <div class="form-group">
            <label class="form-label">Project Title</label>
            <input type="text" name="title" placeholder="e.g. Machine Learning Assignment" required>
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" placeholder="Briefly describe your project..."></textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label class="form-label">Start Date</label>
                <input type="date" name="start_date" required>
            </div>
            <div class="form-group">
                <label class="form-label">Deadline</label>
                <input type="date" name="deadline" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Total Budget ($)</label>
            <input type="number" step="0.01" name="budget" placeholder="0.00">
        </div>
        <div style="display:flex; gap:10px; margin-top:8px;">
            <button type="submit" class="btn btn-primary">💾 Save Project</button>
            <a href="{{ url_for('home') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
